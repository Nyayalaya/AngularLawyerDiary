<div class="border rounded p-2 mb-2 bg-white shadow-sm">

  <!-- ================= MAIN ROW ================= -->

  <div class="row g-2 align-items-center">

    <!-- Label -->
    <div class="col-md-2">
      <input class="form-control form-control-sm"
             [(ngModel)]="field().label"
             placeholder="Label">
    </div>

    <!-- Name -->
    <div class="col-md-2">
      <input class="form-control form-control-sm"
             [(ngModel)]="field().name"
             placeholder="Name">
    </div>

    <!-- ================= TYPE (SAFE + STRICT) ================= -->

    <div class="col-md-2">
      <select class="form-select form-select-sm"
              [(ngModel)]="field().type"
              (ngModelChange)="onTypeChange($event)">

        @for (group of groupedTypes; track group.key) {

          <optgroup [label]="group.key">

            @for (t of group.value; track t.type) {
              <option [value]="t.type">
                {{ t.label }}
              </option>
            }

          </optgroup>

        }

      </select>
    </div>

    <!-- Placeholder -->
    <div class="col-md-2">
      <input class="form-control form-control-sm"
             [(ngModel)]="field().placeholder"
             placeholder="Placeholder">
    </div>

    <!-- Default -->
    <div class="col-md-1">
      <input class="form-control form-control-sm"
             [(ngModel)]="field().defaultValue"
             placeholder="Default">
    </div>

    <!-- Column span -->
    <div class="col-md-1">
      <select class="form-select form-select-sm"
              [(ngModel)]="field().columnSpan">

        <option [ngValue]="1">1</option>
        <option [ngValue]="2">2</option>
        <option [ngValue]="3">3</option>

      </select>
    </div>

    <!-- Required -->
    <div class="col-md-1 text-center">
      <input type="checkbox"
             [checked]="isRequired()"
             (change)="toggleRequired($event)">
      <small>Req</small>
    </div>

    <!-- Advanced toggle -->
    <div class="col-md-1 text-center">
      <button type="button"
              class="btn btn-sm btn-outline-secondary"
              (click)="showAdvanced.set(!showAdvanced())">
        ⚙
      </button>
    </div>

    <!-- Delete -->
    <div class="col-md-1 text-end">
      <button type="button"
              class="btn btn-sm btn-danger"
              (click)="remove.emit()">
        ✕
      </button>
    </div>

  </div>



  <!-- ================= ADVANCED PANEL ================= -->

  @if (showAdvanced()) {

    <div class="border-top pt-3 mt-3">

      <div class="row g-2">

        <div class="col-md-3">
          <input class="form-control form-control-sm"
                 [(ngModel)]="field().hint"
                 placeholder="Hint">
        </div>

        <div class="col-md-3">
          <input class="form-control form-control-sm"
                 [(ngModel)]="field().tooltip"
                 placeholder="Tooltip">
        </div>

        <div class="col-md-2 d-flex align-items-center gap-2">
          <label>
            <input type="checkbox" [(ngModel)]="field().readonly">
            Readonly
          </label>
        </div>

        <div class="col-md-2 d-flex align-items-center gap-2">
          <label>
            <input type="checkbox" [(ngModel)]="field().disabled">
            Disabled
          </label>
        </div>

        <div class="col-md-2 d-flex align-items-center gap-2">
          <label>
            <input type="checkbox" [(ngModel)]="field().hidden">
            Hidden
          </label>
        </div>

      </div>


      <!-- ================= OPTIONS EDITOR ================= -->

      @if (isOptionField(field().type)) {

        <div class="mt-3">

          <div class="d-flex justify-content-between mb-2">
            <strong>Options</strong>
            <button type="button"
                    class="btn btn-sm btn-success"
                    (click)="addOption()">
              + Option
            </button>
          </div>

          @for (opt of (field().options ?? []); let i = $index; track i) {

            <div class="row g-2 mb-2">

              <div class="col-md-5">
                <input class="form-control form-control-sm"
                       [(ngModel)]="opt.label"
                       placeholder="Label">
              </div>

              <div class="col-md-5">
                <input class="form-control form-control-sm"
                       [(ngModel)]="opt.value"
                       placeholder="Value">
              </div>

              <div class="col-md-2 text-end">
                <button type="button"
                        class="btn btn-sm btn-danger"
                        (click)="removeOption(i)">
                  ✕
                </button>
              </div>

            </div>

          }

        </div>

      }

    </div>

  }

</div>
