@if (schema) {

<form [formGroup]="form">

  <h4>{{ schema.name }}</h4>

  @for (section of schema.sections; track section) {
    <app-section-renderer
      [section]="section"
      [group]="form"
      [columns]="schema.columns">
    </app-section-renderer>
  }

  @for (grid of schema.grids ?? []; track grid) {
    <app-grid-renderer
      [grid]="grid"
      [group]="form">
    </app-grid-renderer>
  }

  <button type="button"
          class="btn btn-primary mt-3"
          (click)="submit()">
    Submit
  </button>

</form>

}
