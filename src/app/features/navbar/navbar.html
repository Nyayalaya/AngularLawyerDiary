<header class="navbar">
  <div class="navbar-content">

    <div class="search-container">
      <span class="material-icons search-icon">search</span>

      <input type="text" class="search-input" placeholder="Search cases, clients, lawyers..." [(ngModel)]="searchQuery"
        (keyup.enter)="onSearch()" />
    </div>

    <div class="navbar-actions">
      <button class="icon-button">
        <span class="material-icons">notifications</span>
        <span class="notification-badge"></span>
      </button>

      <div class="profile-dropdown" (click)="onDropdownClick($event)">

        <button
          type="button"
          class="profile-button"
          (click)="toggleProfileDropdown($event)"
          [attr.aria-expanded]="profileDropdownOpen"
          [attr.aria-haspopup]="true">

          <div class="profile-avatar">
            <span class="material-icons">person</span>
          </div>

          <div class="profile-info">
            <span class="profile-name">{{ currentUser?.name }}</span>
            <span class="profile-role">{{ currentUser?.role }}</span>
          </div>
        </button>

        <div *ngIf="profileDropdownOpen" class="dropdown-menu" role="menu">

          <button class="dropdown-item" (click)="navigateToProfile()" role="menuitem">
            <span class="material-icons">person</span>
            <span>Profile</span>
          </button>

          <button class="dropdown-item" (click)="navigateToSettings()" role="menuitem">
            <span class="material-icons">settings</span>
            <span>Settings</span>
          </button>

          <div class="dropdown-divider"></div>

          <button class="dropdown-item logout" (click)="logout()" role="menuitem">
            <span class="material-icons">logout</span>
            <span>Logout</span>
          </button>

        </div>

      </div>

    </div>
  </div>

</header>
