<!-- Loading -->
<ng-container *ngIf="(loading$ | async); else tableOrError">
  <div class="loader-container">
    <div class="loader-card">
      <div class="spinner"></div>
      <p class="loading-text">Loading court levels...</p>
    </div>
  </div>
</ng-container>

<!-- Table -->
<ng-template #tableOrError>

  <!-- Error Banner -->
  <div *ngIf="(error$ | async) as error"
       class="alert alert-danger d-flex align-items-center gap-2 mb-3">
    <i class="bi bi-exclamation-triangle-fill"></i>
    <span>{{ error }}</span>
  </div>

  <app-generic-table
    *ngIf="!showForm()"
    title="Court Levels"
    [data]="(courtLevels$ | async) || []"
    [columns]="columns"
    [serverSide]="true"
    [totalRecords]="(totalRecords$ | async) || 0"
    [currentPage]="(pageNumber$   | async) || 1"
    [pageSize]="(pageSize$     | async) || 10"
    [totalPages]="(totalPages$   | async) || 0"
    (added)="toggleForm()"
    (edit)="onEdit($event)"
    (delete)="onDelete($event)"
    (view)="onView($event)"
    (pageChanged)="onPageChanged($event)">
  </app-generic-table>

</ng-template>

<!-- Form -->
<div [formGroup]="courtLevelForm">
  <app-generic-form-model
    [form]="courtLevelForm"
    [title]="isEditMode() ? 'Edit Court Level' : 'Add Court Level'"
    [show]="showForm()"
    (save)="onSubmit()"
    (close)="showForm.set(false)">

    <input
      class="form-control"
      formControlName="name"
      placeholder="Court Level Name"
      [class.is-invalid]="courtLevelForm.get('name')?.invalid &&
                           courtLevelForm.get('name')?.touched">
    <div class="invalid-feedback">
      Court Level Name is required (min 2 characters)
    </div>

    <input
      class="form-control mt-2"
      formControlName="code"
      placeholder="Code"
      [class.is-invalid]="courtLevelForm.get('code')?.invalid &&
                           courtLevelForm.get('code')?.touched">
    <div class="invalid-feedback">
      Code is required (min 2 characters)
    </div>

  </app-generic-form-model>
</div>
